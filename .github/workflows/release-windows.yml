name: Release Windows

on:
  push:
    tags:
      - "windows-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Windows release tag
        required: true
        default: windows-v1.1.5

permissions:
  contents: write

jobs:
  release-windows-x64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target
      - run: npm ci
      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: cargo fmt --manifest-path src-tauri/Cargo.toml --check
      - run: cargo test --manifest-path src-tauri/Cargo.toml --target x86_64-pc-windows-msvc
      - run: cargo clippy --manifest-path src-tauri/Cargo.toml --target x86_64-pc-windows-msvc --all-targets -- -D warnings
      - run: npm run tauri -- build --target x86_64-pc-windows-msvc --bundles msi,nsis
      - name: Normalize release filenames and checksums
        shell: pwsh
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          $msi = "outputs/TokenUsage_Windows_${version}_x64.msi"
          $exe = "outputs/TokenUsage_Windows_${version}_x64-setup.exe"
          $checksums = "outputs/SHA256SUMS-Windows-${version}.txt"
          New-Item -ItemType Directory -Force outputs | Out-Null
          Copy-Item (Get-ChildItem src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi | Select-Object -First 1) $msi
          Copy-Item (Get-ChildItem src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*-setup.exe | Select-Object -First 1) $exe
          Get-FileHash $msi -Algorithm SHA256 | ForEach-Object { "$($_.Hash.ToLower())  $(Split-Path $msi -Leaf)" } | Set-Content $checksums
          Get-FileHash $exe -Algorithm SHA256 | ForEach-Object { "$($_.Hash.ToLower())  $(Split-Path $exe -Leaf)" } | Add-Content $checksums
          "RELEASE_VERSION=$version" | Add-Content $env:GITHUB_ENV
          "WINDOWS_MSI=$msi" | Add-Content $env:GITHUB_ENV
          "WINDOWS_EXE=$exe" | Add-Content $env:GITHUB_ENV
          "WINDOWS_CHECKSUMS=$checksums" | Add-Content $env:GITHUB_ENV
          "RELEASE_NOTES=docs/release-notes-v${version}.md" | Add-Content $env:GITHUB_ENV
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          name: Token用量 Windows v${{ env.RELEASE_VERSION }}
          body_path: ${{ env.RELEASE_NOTES }}
          draft: false
          prerelease: false
          make_latest: false
          files: |
            ${{ env.WINDOWS_MSI }}
            ${{ env.WINDOWS_EXE }}
            ${{ env.WINDOWS_CHECKSUMS }}
