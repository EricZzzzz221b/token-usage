name: Release Windows

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Windows release tag
        required: true
        default: windows-v1.0.0

permissions:
  contents: write

jobs:
  release-windows-x64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target
      - run: npm ci
      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: cargo fmt --manifest-path src-tauri/Cargo.toml --check
      - run: cargo test --manifest-path src-tauri/Cargo.toml --target x86_64-pc-windows-msvc
      - run: cargo clippy --manifest-path src-tauri/Cargo.toml --target x86_64-pc-windows-msvc --all-targets -- -D warnings
      - run: npm run tauri -- build --target x86_64-pc-windows-msvc --bundles msi,nsis
      - name: Normalize release filenames and checksums
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force outputs | Out-Null
          Copy-Item (Get-ChildItem src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi | Select-Object -First 1) outputs/TokenUsage_Windows_1.0.0_x64.msi
          Copy-Item (Get-ChildItem src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*-setup.exe | Select-Object -First 1) outputs/TokenUsage_Windows_1.0.0_x64-setup.exe
          Get-FileHash outputs/TokenUsage_Windows_1.0.0_x64.msi -Algorithm SHA256 | ForEach-Object { "$($_.Hash.ToLower())  TokenUsage_Windows_1.0.0_x64.msi" } | Set-Content outputs/SHA256SUMS-Windows-1.0.0.txt
          Get-FileHash outputs/TokenUsage_Windows_1.0.0_x64-setup.exe -Algorithm SHA256 | ForEach-Object { "$($_.Hash.ToLower())  TokenUsage_Windows_1.0.0_x64-setup.exe" } | Add-Content outputs/SHA256SUMS-Windows-1.0.0.txt
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: Token用量 Windows v1.0.0
          body_path: docs/release-notes-windows-v1.0.0.md
          draft: false
          prerelease: false
          files: |
            outputs/TokenUsage_Windows_1.0.0_x64.msi
            outputs/TokenUsage_Windows_1.0.0_x64-setup.exe
            outputs/SHA256SUMS-Windows-1.0.0.txt
